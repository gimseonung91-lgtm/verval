<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home ABA - 가정 내 언어행동 중재 시스템</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-font-awesome-kit.js" crossorigin="anonymous"></script>
</head>
<body>
    <header class="app-header">
        <h1>Home ABA</h1>
        <div class="session-timer" id="sessionTimer">00:00</div>
    </header>

    <main id="app-content">
        <!-- Content will be injected here via main.js -->
        <div id="view-container"></div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-view="mand">
            <span class="icon">🎁</span>
            <span class="label">맨드</span>
        </button>
        <button class="nav-item" data-view="tact">
            <span class="icon">📸</span>
            <span class="label">택트</span>
        </button>
        <button class="nav-item" data-view="echoic">
            <span class="icon">🗣️</span>
            <span class="label">에코익</span>
        </button>
        <button class="nav-item" data-view="intraverbal">
            <span class="icon">💬</span>
            <span class="label">대답</span>
        </button>
        <button class="nav-item" data-view="dashboard">
            <span class="icon">📊</span>
            <span class="label">기록</span>
        </button>
    </nav>

    <!-- Firebase SDK (Modular) -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@latest/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
